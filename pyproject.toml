[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "nefes"
authors = [
    { name = "Cetin Alanyalioglu" },
]
version = "0.1.0"
description = "Network solver for reacting compressible flows and thermoacoustics"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scipy",
    "numba",
    "pyyaml",
]

[project.optional-dependencies]
dev = ["pytest", "flake8", "black"]
jupyter = ["jupyterlab", "notebook", "ipykernel", "nbformat>=4.2.0", "plotly>=5.0"]
# Documentation site: quartodoc renders the API pages from docstrings and the
# example gallery executes notebooks, so it pulls the notebook stack too.
# The Quarto CLI itself is external and installed separately (https://quarto.org).
docs = ["nefes[jupyter]", "quartodoc>=0.11", "griffe>=1.5,<2", "nbclient"]

[tool.setuptools.packages.find]
include = ["nefes*"]

[tool.setuptools.package-data]
# ship the vendored NASA Glenn / CEA thermo database and the native species YAMLs
"nefes.thermo" = ["data/*.inp", "data/*.yaml"]

[tool.black]
line-length = 120
target-version = ["py311", "py312"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["ignore::numba.core.errors.NumbaPerformanceWarning"]
