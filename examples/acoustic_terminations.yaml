# Acoustic terminations -- saved from the FNetLibUI tool (model: fns-flow-network).
#
#   reservoir --(feed)--> Junction --(main)--> Duct --> PressureOutlet (liner)
#                              \--(branch)--> Duct --> Wall
#
# Demonstrates the perturbation boundary conditions the UI exposes through each
# boundary's "Acoustic boundary" dropdown (rigid wall / open end / specific
# impedance).  Inlets and outlets default to Open (an ideal pressure release,
# p'=0); here both terminals select Impedance instead:
#   * the outlet is an IMPEDANCE liner -- specific impedance magnitude 2, phase 0,
#     so its reflection is R = (zeta - 1)/(zeta + 1) = 1/3,
#   * a WALL closes a side branch (rigid: a quarter-wave resonator, no mean flow),
#   * the reservoir is matched/anechoic (impedance, magnitude 1, phase 0).
#
# The mean flow runs reservoir -> outlet; the branch is stagnant.  To force the
# acoustic response, attach an excitation in Python (an "advanced" BC) and sweep:
#
#     from fns.io import load_case
#     from fns.perturbation import PerturbationBC, boundary_response
#     net = load_case("examples/acoustic_terminations.yaml")
#     net._elements[0].perturbation_bc = PerturbationBC.excitation(1.0)  # drive the inlet
#     sol = net.solve()
#     fr = boundary_response(sol.problem, sol.x, omegas)

version: 2.0.0
model:
  id: fns-flow-network
  globalAttributes:
    gasConstant: 287.0
    heatCapacityRatio: 1.4
    referencePressure: 101325.0
    referenceTemperature: 300.0
    referenceMassFlow: 5.0
  nodes:
    - id: TotalPressureInlet_1
      type: TotalPressureInlet
      attributes:
        label: reservoir
        index: 0
        totalPressure: 110000.0
        totalTemperature: 300.0
        boundaryType: impedance
        impedanceMagnitude: 1.0
        impedancePhase: 0.0
    - id: JunctionStaticP_1
      type: JunctionStaticP
      attributes:
        label: tee
        index: 1
    - id: Duct_1
      type: Duct
      attributes:
        label: main-duct
        index: 2
        length: 0.60
    - id: PressureOutlet_1
      type: PressureOutlet
      attributes:
        label: liner
        index: 3
        pressure: 101325.0
        backflowTotalTemperature: 300.0
        boundaryType: impedance
        impedanceMagnitude: 2.0
        impedancePhase: 0.0
    - id: Duct_2
      type: Duct
      attributes:
        label: branch-duct
        index: 4
        length: 0.25
    - id: Wall_1
      type: Wall
      attributes:
        label: resonator-end
        index: 5
        boundaryType: rigid
  edges:
    - id: edge_1
      source: TotalPressureInlet_1
      target: JunctionStaticP_1
      sourceHandle: TotalPressureInlet_1-port-0
      targetHandle: JunctionStaticP_1-port-0
      type: flow
      attributes:
        label: feed
        index: 0
        area: 0.020
    - id: edge_2
      source: JunctionStaticP_1
      target: Duct_1
      sourceHandle: JunctionStaticP_1-port-1
      targetHandle: Duct_1-port-0
      type: flow
      attributes:
        label: main
        index: 1
        area: 0.020
    - id: edge_3
      source: Duct_1
      target: PressureOutlet_1
      sourceHandle: Duct_1-port-1
      targetHandle: PressureOutlet_1-port-0
      type: flow
      attributes:
        label: main-out
        index: 2
        area: 0.020
    - id: edge_4
      source: JunctionStaticP_1
      target: Duct_2
      sourceHandle: JunctionStaticP_1-port-2
      targetHandle: Duct_2-port-0
      type: flow
      attributes:
        label: branch
        index: 3
        area: 0.010
    - id: edge_5
      source: Duct_2
      target: Wall_1
      sourceHandle: Duct_2-port-1
      targetHandle: Wall_1-port-0
      type: flow
      attributes:
        label: branch-out
        index: 4
        area: 0.010
