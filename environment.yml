name: nefes
channels:
  - conda-forge
dependencies:
  # Supported floor is Python 3.11; this dev env pins 3.12. Core dependency floors mirror
  # pyproject.toml (scipy >= 1.15 is required for scipy.interpolate.AAA).
  - python=3.12
  - numpy>=1.26
  - scipy>=1.15
  - numba>=0.60
  - pyyaml>=6
  - pytest>=7.0
  - flake8>=6.0
  - black>=24.0
  # visualization + notebook stack (the `viz` and `jupyter` extras)
  - plotly>=5.0
  - jupyterlab>=4.0
  - notebook>=7.0
  - ipykernel>=6.0
  - nbformat>=5.1
  - nbclient>=0.6
  # documentation site (the `docs` extra); the Quarto CLI itself is external (https://quarto.org)
  - griffe>=1.5,<2
  - pip
  - pip:
      - quartodoc>=0.11
