[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "fns"
version = "0.1.0"
description = "Flow Network Solver - compressible-flow network analysis (mean flow + acoustics)"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scipy",
    "numba",
    "pyyaml",
]

[project.optional-dependencies]
dev = ["pytest", "flake8", "black"]
jupyter = ["jupyterlab", "notebook", "ipykernel", "nbformat>=4.2.0", "plotly>=5.0"]

[tool.setuptools.packages.find]
include = ["fns*"]

[tool.black]
line-length = 120
target-version = ["py311", "py312"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["ignore::numba.core.errors.NumbaPerformanceWarning"]
