name: nefes
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy
  - scipy
  - numba
  - pyyaml
  - pytest
  - flake8
  - black
  # visualization + notebook stack (the `viz` and `jupyter` extras)
  - plotly
  - jupyterlab
  - notebook
  - ipykernel
  - nbformat
  - nbclient
  # documentation site (the `docs` extra); the Quarto CLI itself is external (https://quarto.org)
  - griffe>=1.5,<2
  - pip
  - pip:
      - quartodoc>=0.11
