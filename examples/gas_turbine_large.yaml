# Gas-turbine secondary-air system -- saved from the FNetLibUI tool
# (model: fns-flow-network).  The large showcase network adapted from the
# preliminary-study prototype; it loads and solves verbatim on the current Nefes.
#
#   HP bleed (total-P) --\
#                         JunctionStaticP (mix-plenum) --> IsentropicAreaChange
#   LP bleed (mass-flow) /                                  (main-feed) --> ...
#
#       ... --> LosslessSplitter (main-manifold) --> 3 sub-manifold legs,
#               each a JunctionStaticP feeding several cooling circuits:
#                 * orifice  : IsentropicAreaChange + LossElement     --> sink
#                 * nozzle   : IsentropicAreaChange + SuddenAreaChange
#                              (dump) + LossElement                   --> sink
#                 * lab. seal: two series LossElements                --> sink
#               every sink is a fixed-back-pressure PressureOutlet.
#
# A model of a turbine's secondary-air (cooling/sealing) distribution: two bleed
# feeds mix, pass a contraction, and split across three manifolds that meter air
# to ~15 sinks through orifices, dump nozzles and labyrinth seals.  A LossElement
# "cross-bridge" links sub-manifold-0 to sub-manifold-1, so the graph carries a
# cycle (not a tree).
#
# Things this case exercises on the current solver:
#   * mixed inlet boundaries -- a TotalPressureInlet (HP, 900 kPa / 700 K) and a
#     MassFlowInlet (LP, 3 kg/s / 480 K) -- merged at a static-pressure junction;
#   * a non-tree topology (the cross-bridge cycle between two sub-manifolds);
#   * EMERGENT BACKFLOW: the sink "sink-1480--560" sits at 830 kPa, above the
#     local manifold static pressure, so it ingests air (mdot ~ -0.14 kg/s).  Its
#     backflowTotalTemperature closes the energy balance for the ingested stream.
#   * ACOUSTIC PROPAGATION: six constant-area Duct sections sit on the transport
#     runs -- the two inlet feeds (hp/lp-feed-duct), the main manifold pipe
#     (main-feed-pipe) and each sub-manifold feed (sub-feed-duct-0/1/2).  A Duct
#     is INERT in the mean flow (its length never enters the steady residual, and
#     its two edges share one area), so the converged mean flow is unchanged; it
#     carries the wave phase the perturbation network propagates.  Note the area
#     is held constant ACROSS each duct (both incident edges have equal area) --
#     area changes belong to IsentropicAreaChange / SuddenAreaChange, not ducts.
#
# 63 elements / 63 edges (6 of them constant-area ducts); converges in ~15 Newton
# steps to ||r|| ~ 1e-15; fully subsonic (max M ~ 0.65), so it stays inside the v1
# subsonic scope.  As with the other UI exports, edges reference PORTS via
# sourceHandle / targetHandle (`<node>-port-<ordinal>`): port 0 is the target
# (incoming) side, port 1 the source (outgoing) side; the loader densifies each
# element's incident ports.

