[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "nefes"
version = "0.1.0"
description = "Network solver for reacting compressible flows and thermoacoustics"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scipy",
    "numba",
    "pyyaml",
]

[project.optional-dependencies]
dev = ["pytest", "flake8", "black"]
jupyter = ["jupyterlab", "notebook", "ipykernel", "nbformat>=4.2.0", "plotly>=5.0"]

[tool.setuptools.packages.find]
include = ["nefes*", "thermolib*"]

[tool.setuptools.package-data]
# ship the vendored NASA Glenn / CEA thermo database and the native species YAMLs
"thermolib" = ["data/*.inp", "data/*.yaml"]

[tool.black]
line-length = 120
target-version = ["py311", "py312"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["ignore::numba.core.errors.NumbaPerformanceWarning"]
