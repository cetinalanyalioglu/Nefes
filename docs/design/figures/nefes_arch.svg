<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 840 420" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0.4 L6.5,3 L0,5.6 Z" fill="#52606d"/>
    </marker>
  </defs>

  <!-- white figure card so it reads on light or dark backgrounds -->
  <rect x="1" y="1" width="838" height="418" rx="14" fill="#ffffff" stroke="#e4e7ec"/>

  <!-- Python object layer: label centered above the container -->
  <text x="210" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Python object layer</text>
  <rect x="44" y="104" width="332" height="280" rx="10" fill="none" stroke="#2563eb" stroke-width="2"/>

  <!-- Network (top-left) -->
  <rect x="70" y="122" width="280" height="96" rx="8" fill="#eef4ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="210" y="165" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Network</text>
  <text x="210" y="188" text-anchor="middle" font-size="13" fill="#1e3a8a">elements · connectivity · parameters</text>

  <!-- Sparse solve (bottom-left) -->
  <rect x="70" y="270" width="280" height="96" rx="8" fill="#eef4ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="210" y="313" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Sparse solve</text>
  <text x="210" y="336" text-anchor="middle" font-size="13" fill="#1e3a8a">&amp; perturbation analysis</text>

  <!-- CompiledProblem (top-right) -->
  <rect x="490" y="122" width="300" height="96" rx="8" fill="#fff5e6" stroke="#f97316" stroke-width="1.5"/>
  <text x="640" y="165" text-anchor="middle" font-size="15" font-weight="700" fill="#7c2d12">CompiledProblem — immutable</text>
  <text x="640" y="188" text-anchor="middle" font-size="13" fill="#7c2d12">flat arrays · CSR/CSC sparse layout</text>

  <!-- Compiled kernel (bottom-right) -->
  <rect x="490" y="270" width="300" height="96" rx="8" fill="#e8f0fb" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="640" y="302" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">Compiled kernel · @njit</text>
  <text x="640" y="323" text-anchor="middle" font-size="13" fill="#1e3a8a">residual + Jacobian (complex-step)</text>
  <text x="640" y="341" text-anchor="middle" font-size="13" fill="#1e3a8a">· thermochemistry</text>

  <!-- arrows (straight; boxes are row-aligned) -->
  <!-- Network -> CompiledProblem -->
  <path d="M350,170 L488,170" fill="none" stroke="#52606d" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="419" y="160" text-anchor="middle" font-size="14" fill="#52606d">freeze</text>

  <!-- CompiledProblem -> kernel -->
  <path d="M640,218 L640,268" fill="none" stroke="#52606d" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- kernel -> Sparse solve -->
  <path d="M490,318 L352,318" fill="none" stroke="#52606d" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- R, J rendered as Computer Modern (LaTeX) glyph outlines -->
