# Nefes documentation — Quarto render layer.
#
# The Markdown under docs/ stays the authoritative source; Quarto renders it to HTML,
# without moving or rewriting anything. Two surfaces are generated at build time:
#
#   * reference/api/  — API pages built from docstrings by quartodoc (pre-render).
#   * examples/       — the notebook gallery built by _scripts/build_examples.py (pre-render).
#
# Preview locally with `quarto preview docs`; the example pages execute notebooks, so point
# Quarto at the project environment first, e.g. `QUARTO_PYTHON=$(which python) quarto render docs`.
# The internal planning document is excluded from the render below.

project:
  type: website
  output-dir: _site
  pre-render:
    - quartodoc build --config _quarto.yml
    - _scripts/build_examples.py
  render:
    - "*.md"
    - "theory/*.md"
    - "theory/*.qmd"
    - "design/*.md"
    - "design/*.qmd"
    - "validation/*.md"
    - "reference/*.md"
    - "reference/api/*.qmd"
    - "examples/*.qmd"
    - "examples/*.ipynb"
    - "!documentation-plan.md"

website:
  title: "Nefes"
  description: "Network solver for reacting compressible flows and thermoacoustics."
  reader-mode: true
  sidebar:
    style: docked
    search: true
    collapse-level: 1
    contents:
      - href: index.md
        text: Home
      - href: best-practices.md
        text: Best practices
      - href: conventions.md
        text: Conventions
      - section: "Theory"
        contents:
          - theory/overview.md
          - theory/framework.md
          - theory/governing-equations.md
          - theory/state-and-recovery.qmd
          - theory/equation-structure.md
          - theory/transport.qmd
          - theory/elements.md
          - theory/well-posedness.md
          - theory/characteristics.md
          - theory/choking.qmd
      - section: "Theory — acoustics & reacting flow"
        contents:
          - theory/thermochemistry.md
          - theory/perturbation-network.md
          - theory/dynamic-sources.qmd
          - theory/analyses.qmd
          - theory/identification.md
          - theory/limitations.md
      - section: "Design"
        contents:
          - design/philosophy.md
          - design/kernel-architecture.md
          - design/complex-step.qmd
          - design/smoothness-contract.md
          - design/assembly.md
          - design/parameters.md
          - design/solver.md
          - design/reproducibility.md
          - design/ui-io.md
      - section: "Validation"
        contents:
          - validation/validation-map.md
          - validation/verification.md
          - validation/benchmarks.md
      - section: "Reference"
        contents:
          - reference/atomic-elements.md
          - reference/composite-elements.md
          - reference/parameters.md
          - reference/modeling-guide.md
          - reference/examples.md
          - text: "API reference"
            href: reference/api/index.qmd
      - section: "Examples"
        contents:
          - examples/index.qmd
      - href: nomenclature.md
        text: Nomenclature

quartodoc:
  package: nefes
  dir: reference/api
  title: "API reference"
  style: pkgdown
  parser: numpy
  sections:
    - title: "Network and solution"
      desc: "Assemble a network, solve the mean flow, and read the result."
      contents:
        - shell.Network
        - shell.Solution
        - shell.parameter_study
        - shell.StudyResult
        - shell.build_problem
        - shell.build_problem_from_connectivity
        - shell.validate_network
    - title: "Elements — atomic"
      desc: "Factories for the atomic elements: boundaries, area changes, losses, ducts, junctions, and reacting closures."
      contents:
        - elements.catalog.total_pressure_inlet
        - elements.catalog.mass_flow_inlet
        - elements.catalog.pressure_outlet
        - elements.catalog.mass_flow_outlet
        - elements.catalog.choked_nozzle_outlet
        - elements.catalog.isentropic_area_change
        - elements.catalog.sudden_area_change
        - elements.catalog.loss
        - elements.catalog.linear_resistance
        - elements.catalog.duct
        - elements.catalog.pipe
        - elements.catalog.junction
        - elements.catalog.splitter
        - elements.catalog.forced_splitter
        - elements.catalog.wall
        - elements.catalog.cavity
        - elements.catalog.heat_release_flame
        - elements.catalog.equilibrium_flame
        - elements.catalog.mass_source
        - elements.catalog.transfer_matrix_element
    - title: "Elements — composites"
      desc: "Composite elements that expand into a small graph of atoms, and the element specs."
      contents:
        - elements.catalog.orifice
        - elements.catalog.lossy_nozzle
        - elements.catalog.sudden_contraction
        - elements.catalog.helmholtz_resonator
        - elements.catalog.fanno_pipe
        - elements.catalog.tapered_duct
        - elements.catalog.segments_for_frequency
        - elements.catalog.ElementSpec
        - elements.catalog.CompositeElementSpec
    - title: "Perturbation and acoustics"
      desc: "The linear perturbation network: boundary closures, responses, eigenmodes, matrices, and identification."
      contents:
        - perturbation.PerturbationBC
        - perturbation.perturbation_response
        - perturbation.PerturbationResponse
        - perturbation.forced_response
        - perturbation.ForcedResponse
        - perturbation.eigenmodes
        - perturbation.EigenmodeResult
        - perturbation.TransferMatrix
        - perturbation.ScatteringMatrix
        - perturbation.identify_transfer_function
        - perturbation.identify_transfer_matrix
        - perturbation.find_terminals
        - perturbation.verify_perturbation
    - title: "Input / output"
      desc: "Load and save cases and solutions."
      contents:
        - io.load_case
        - io.load_solution
        - io.load_connectivity
        - io.case_from_dict
        - io.save_case
        - io.save_solution
        - io.dump_case
    - title: "Plotting"
      desc: "The nefes plotly theme and the standard figure helpers."
      contents:
        - plotting.use_nefes_theme
        - plotting.use_latex
        - plotting.plot_complex_matrix
        - plotting.plot_transfer_matrix
        - plotting.plot_scattering_matrix
        - plotting.plot_transfer_function
        - plotting.plot_spectrum
        - plotting.plot_pole_map
        - plotting.plot_mode_shape
        - plotting.animate_mode_shape
        - plotting.plot_network_topology
        - plotting.plot_fit

format:
  html:
    theme: [cosmo, custom.scss]
    toc: true
    toc-depth: 3
    html-math-method: katex
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true

bibliography: references.bib
